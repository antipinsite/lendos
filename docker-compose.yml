services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    expose:
      - "3000"

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    expose:
      - "1337"
    volumes:
      - ./backend/public/uploads:/app/public/uploads
      - ./backend/.tmp:/app/.tmp
      - ./backend/.cache:/app/.cache
      - ./backend/database:/app/database   # ← ВАЖНО

volumes:
  caddy_data:
  caddy_config: